name: Update and deploy SGX Butter dashboard

on:
  push:
    branches: ["main"]
    paths:
      - "sgx-butter-dashboard/*.py"
      - "sgx-butter-dashboard/config.example.json"
      - "sgx-butter-dashboard/tests/**"
      - ".github/workflows/sgx-butter-pages.yml"
  workflow_dispatch:
  schedule:
    # 19:45 Asia/Shanghai / Singapore time, Monday-Friday.
    - cron: "45 11 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Prepare public configuration
        working-directory: sgx-butter-dashboard
        run: cp config.example.json config.json

      - name: Collect SGX data and rebuild dashboard
        working-directory: sgx-butter-dashboard
        run: python sgx_butter_collector.py --config config.json collect --no-notify

      - name: Persist the updated public market-data snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sgx-butter-dashboard/dashboard.html sgx-butter-dashboard/data/sgx_butter.sqlite3
          git diff --cached --quiet || git commit -m "data: refresh SGX Butter dashboard"
          git push

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp sgx-butter-dashboard/dashboard.html _site/index.html
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v5
